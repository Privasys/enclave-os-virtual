[Partition]
Type=linux-generic
Label=containers
SizeMinBytes=8G
# No SizeMaxBytes — partition fills all remaining disk space.
# Operator controls container storage by choosing the cloud disk size
# at instance creation time (e.g. --create-disk=size=50 for ~46 GB).
#
# Initialised as an LVM PV by container-volumes-setup at first boot.
# Each container gets an independent LV with its own LUKS2+AEAD
# encryption key (BYOK per-container or fetched from Enclave Vaults).
#
# No filesystem is created here — LVM manages the raw block device.
