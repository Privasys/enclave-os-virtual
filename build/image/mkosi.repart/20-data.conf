[Partition]
Type=linux-generic
Label=data
Format=ext4
SizeMinBytes=2G
SizeMaxBytes=2G
# OS data partition — fixed 2G for platform config (ca.crt, ca.key,
# manager.env, manifest.yaml). LUKS2+AEAD encrypted by luks-setup.
# Container storage uses separate per-container LVM volumes on the
# containers partition (see 30-containers.conf).
