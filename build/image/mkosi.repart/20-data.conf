[Partition]
Type=linux-generic
Label=data
SizeMinBytes=1M
SizeMaxBytes=1M
# Stubbed since v0.4.0: the real /data lives on a dedicated cloud PD
# attached as device-name=data (see luks-setup). This 1M placeholder
# remains so /dev/disk/by-partlabel/data still resolves on legacy VMs
# that have not yet been migrated to the dedicated-PD layout; in that
# case luks-setup falls back to it.
#
# DO NOT format here — luks-setup owns formatting of either the
# dedicated PD (preferred) or this placeholder (legacy fallback).
# When all VMs are migrated, this file can be deleted entirely.
