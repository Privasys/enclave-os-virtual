# Dev image SSH policy (dev profile only). Pairs with 60-gce.conf
# (AuthorizedKeysCommand -> GCE metadata) and the baked
# /root/.ssh/authorized_keys. Key-only root access for debugging; no
# passwords. Production ships no sshd, so this never applies there.
PermitRootLogin prohibit-password
PasswordAuthentication no
KbdInteractiveAuthentication no
