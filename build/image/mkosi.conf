[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe

[Output]
Format=disk
ImageId=enclave-os-virtual
ImageVersion=0.1.0
CompressOutput=false

[Content]
Packages=
    # ── Core system (from tdx-image-base) ──
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping
    openssh-server
    openssh-client

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # LVM for per-container encrypted volumes
    lvm2

    # GCP guest agent and drivers
    google-compute-engine
    google-guest-agent

    # Kernel — patched Ubuntu HWE 6.19 with CVM guard (BadAML mitigation).
    # Built by build/kernel/build-kernel.sh and installed from local .debs
    # via PackageDirectories below.  The CVM guard blocks AML bytecode from
    # accessing pages marked as encrypted/private on TDX and SEV-SNP VMs.
    # See build/kernel/patches/ for the patch.
    #
    # The stock linux-image-generic-hwe-24.04 is NOT used because it lacks
    # the CVM guard.  Do not add it back.

    # ── Workload layer (Enclave OS (Virtual)) ──

    # containerd container runtime
    containerd
    runc

    # TDX attestation happens via configfs-tsm (kernel interface), no
    # userspace DCAP libraries needed — go-tdx-guest uses /sys/kernel/config/tsm.

    # Certificate utilities
    ca-certificates
    openssl

    # Debugging (remove for production hardening)
    strace
    tcpdump
    curl
    jq

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8

[Build]
PackageDirectories=../kernel/debs
