[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe

[Output]
Format=disk
ImageId=enclave-os-virtual
ImageVersion=0.1.0
CompressOutput=false
RepartOffline=no

[Config]
# Inherit TDX boot chain and kernel command line from cvm-images tdx-base.
# Provides: grub-efi-amd64-signed, shim-signed, Secure Boot, and
# KernelCommandLine (lockdown=integrity, module.sig_enforce=1).
Include=../cvm-images/images/tdx-base/mkosi.conf.d/boot.conf

[Content]
# Extra trees layered in order:
#   1. cvm-images common overlay (SSH hardening, network, sysctl,
#      volatile mounts, tmpfiles, resolv.conf)
#   2. Enclave OS services (manager, caddy, LUKS, containerd, mounts)
ExtraTrees=../cvm-images/common/mkosi.extra/
            mkosi.extra/

Packages=
    # ── Core system (shared with cvm-images) ──
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping
    openssh-server
    openssh-client

    # Filesystem and disk tools
    e2fsprogs
    pciutils

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # LVM for per-container encrypted volumes
    lvm2

    # Kernel - patched Ubuntu HWE 6.17 with CVM guard (BadAML mitigation).
    # Pre-built .debs are downloaded from the Privasys/cvm-images GitHub
    # releases and installed via PackageDirectories below.  The CVM guard
    # blocks AML bytecode from accessing pages marked as encrypted/private
    # on TDX and SEV-SNP VMs.
    #
    # The stock linux-image-generic-hwe-24.04 is NOT used because it lacks
    # the CVM guard.  Do not add it back.
    linux-image-unsigned-6.17.0-20-generic
    linux-modules-6.17.0-20-generic
    linux-modules-extra-6.17.0-20-generic

    # ── Workload layer (Enclave OS (Virtual)) ──

    # containerd container runtime
    containerd
    runc

    # TDX attestation happens via configfs-tsm (kernel interface), no
    # userspace DCAP libraries needed - go-tdx-guest uses /sys/kernel/config/tsm.

    # Certificate utilities
    ca-certificates
    openssl

    # Debugging (remove for production hardening)
    strace
    tcpdump
    curl
    jq

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8

[Build]
PackageDirectories=../kernel/debs
