[Output]
ImageId=enclave-os-virtual-gpu-dev

[Content]
# Development/debug builds ONLY. Production images contain no SSH daemon
# and no interactive entry point: every code path that can execute in a
# production CVM must be measured at build time, and a runtime shell
# would break that guarantee. The dev ImageId produces distinct
# measurements, so verifiers can always tell a dev image from production.
ExtraTrees=../../../image/mkosi.extra.dev/
Packages=
    # Interactive access
    openssh-server
    openssh-client

    # Debugging tools
    strace
    tcpdump
