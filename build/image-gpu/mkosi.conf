[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe,restricted,multiverse

[Output]
Format=disk
ImageId=enclave-os-virtual-gpu
ImageVersion=0.1.0
CompressOutput=false
RepartOffline=no

[Config]
# Inherit GPU boot chain and kernel command line from cvm-images tdx-gpu.
# Provides: grub-efi-amd64-signed, shim-signed, Secure Boot, and
# KernelCommandLine (iommu=pt, intel_iommu=on, nvidia.NVreg_ConfidentialComputing=1,
# lockdown=integrity, module.sig_enforce=1).
Include=../cvm-images/images/tdx-gpu/mkosi.conf.d/boot.conf

[Content]
# Extra trees layered in order:
#   1. cvm-images common overlay (SSH hardening, network, sysctl,
#      volatile mounts, tmpfiles, resolv.conf)
#   2. Base Enclave OS services (manager, caddy, LUKS, mounts, containerd)
#   3. cvm-images GPU overlay (nvidia-persistenced service enable)
#   4. GPU-specific overrides (containerd config with nvidia default runtime)
ExtraTrees=../cvm-images/common/mkosi.extra/
            ../image/mkosi.extra/
            ../cvm-images/images/tdx-gpu/mkosi.extra/
            mkosi.extra/

# APT repo configuration (NVIDIA + CUDA repos, driver pinning) from cvm-images,
# overlaid with our local pin file that locks the boot kernel ABI to the
# patched cvm-images kernel.
PackageManagerTrees=../cvm-images/images/tdx-gpu/mkosi.pkgmanager
                    mkosi.pkgmanager

# Removes stray /usr/lib/modules/kernel/ dir that breaks depmod.
PrepareScripts=../cvm-images/images/tdx-gpu/mkosi.prepare

# Post-installation scripts:
#   Enclave OS: nvidia-ctk containerd runtime configuration
PostInstallationScripts=mkosi.postinst.chroot

Packages=
    # ── Core system ──
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping
    openssh-server
    openssh-client

    # Filesystem and disk tools
    e2fsprogs
    pciutils

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # LVM for per-container encrypted volumes
    lvm2

    # Kernel - patched Ubuntu HWE 6.17 with CVM guard (BadAML mitigation).
    # Pre-built .debs downloaded from cvm-images GitHub releases.
    linux-image-unsigned-6.17.0-23-generic
    linux-modules-6.17.0-23-generic
    linux-modules-extra-6.17.0-23-generic

    # ── NVIDIA ──
    # Open kernel modules install cleanly but lack TDX CC patches.
    # Patched modules are loaded at runtime from /run/workspace/nvidia-signed-bundle/.
    #
    # IMPORTANT: pin to the SAME ABI as our patched cvm-images kernel
    # (6.17.0-23-generic). Using the meta-package
    # `linux-modules-nvidia-595-server-open-generic-6.17` would pull in
    # whatever is newest in noble-updates, which can drag in a different
    # linux-image-X-generic and replace our kernel, breaking the gve
    # module load (no network).
    #
    # Migrated 590 -> 595.58.03 on 2026-05-03 because Ubuntu turned the
    # 590-server packages into transition shims requiring 595.
    # Bumped ABI -20 -> -23 on 2026-05-04 to match cvm-images kernel-v0.2.1.
    #
    # Switched from `-open-` to non-open variant on 2026-05-19: the only
    # function of this pkg in our image is to populate the kABI-matched
    # /lib/modules/<abi>/kernel/drivers tree so depmod can resolve the
    # nvidia.ko alias; at runtime the actual modules are loaded from
    # /run/workspace/nvidia-signed-bundle/ (the CC-patched signed bundle
    # produced by the cvm-images NVIDIA modules build). The non-open pkg
    # accepts the new `nvidia-kernel-common-595-server >= 595.58.03`
    # whereas the open pkg pins to (<= 595.58.03-1) and noble-updates
    # has bumped common to 595.71.05, breaking the dependency.
    linux-modules-nvidia-595-server-6.17.0-23-generic
    # TCB trim (2026-05-06): the `nvidia-driver-595-server-open` meta pulls
    # display/encode userspace we never use in a confidential GPU workload
    # (libnvidia-{cfg,decode,encode,extra,fbc,gl,gtk,glcore,egl-*}, nvidia-
    # settings, xserver-xorg-video-nvidia, libnvidia-pkcs11). Kept only the
    # explicit minimum needed by vLLM + nvidia-smi + the container runtime:
    #   - nvidia-utils-595-server: nvidia-smi
    #   - libnvidia-compute-595-server: libcuda.so.1, libnvidia-ml.so.1,
    #     libnvidia-nvvm, libnvidia-ptxjitcompiler (CUDA runtime requisites)
    # Driver kABI provided by the linux-modules-nvidia-* package above.
    nvidia-utils-595-server
    libnvidia-compute-595-server
    nvidia-container-toolkit
    cuda-toolkit-13-0

    # ── Workload layer (Enclave OS Virtual) ──
    containerd
    runc
    ca-certificates
    openssl

    # Debugging (remove for production hardening)
    strace
    tcpdump
    curl
    jq

# Pre-built BadAML-patched kernel .debs (from cvm-images releases).
PackageDirectories=../kernel/debs

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/src/linux-headers-*
