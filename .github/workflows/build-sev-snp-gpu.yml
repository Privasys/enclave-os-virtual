name: Build & Publish SEV-SNP GPU Image

# SEV-SNP + GPU variant of Enclave OS Virtual.
# Requires build/image-sev-snp-gpu/ mkosi configs (Phase 4 - not yet implemented).
# Uses cvm-images sev-snp-gpu configs as the base layer.

on:
  push:
    tags: ['sev-snp-gpu-v*']
  workflow_dispatch:
    inputs:
      publish_gcp:
        description: 'Publish image to GCP (requires WIF credentials)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || 'privasys-tdx-images' }}
  IMAGE_FAMILY: ${{ vars.IMAGE_FAMILY_SEV_SNP_GPU || 'privasys-sev-snp-gpu' }}
  GOPROXY: https://proxy.golang.org,direct
  GONOSUMCHECK: '*'
  GONOSUMDB: '*'

jobs:
  build:
    name: Build Enclave OS (Virtual) SEV-SNP GPU image
