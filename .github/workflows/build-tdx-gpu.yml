name: Build & Publish TDX GPU Image

on:
  push:
    branches: [main]
    tags: ['tdx-gpu-v*']
  pull_request:
    branches: [main]
    paths:
      - 'build/image-gpu/**'
      - 'build/image/mkosi.extra/**'
      - 'cmd/**'
  workflow_dispatch:
    inputs:
      publish_gcp:
        description: 'Publish image to GCP (requires WIF credentials)'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write   # Required for GCP Workload Identity Federation

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || 'privasys-tdx-images' }}
  IMAGE_FAMILY: ${{ vars.IMAGE_FAMILY_GPU || 'privasys-tdx-gpu' }}
  GOPROXY: https://proxy.golang.org,direct
  GONOSUMCHECK: '*'
  GONOSUMDB: '*'

jobs:
  build:
    name: Build Enclave OS (Virtual) GPU image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          # CUDA toolkit + NVIDIA driver require ~15 GB of disk space.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install Privasys Go fork
        run: |
          curl -sL https://github.com/Privasys/go/releases/download/privasys-v0.2.0-go1.25.8/go-ratls-privasys-v0.2.0-go1.25.8-linux-amd64.tar.gz -o /tmp/go-ratls.tar.gz
          sudo tar -C /usr/local -xzf /tmp/go-ratls.tar.gz
          echo "/usr/local/go-ratls/bin" >> "$GITHUB_PATH"
          /usr/local/go-ratls/bin/go version

      - name: Build manager binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o build/image/mkosi.extra/usr/bin/manager \
            ./cmd/manager/

      - name: Build Caddy with RA-TLS module
        run: |
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          xcaddy build \
            --with github.com/Privasys/enclave-os-virtual/caddy/ratls=./caddy/ratls \
            --output build/image/mkosi.extra/usr/bin/caddy
          chmod +x build/image/mkosi.extra/usr/bin/caddy
          ls -lh build/image/mkosi.extra/usr/bin/caddy

      - name: Download patched kernel (CVM guard)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download pre-built kernel .debs from the cvm-images repo.
          # The BadAML patch does NOT change the kernel ABI, so Ubuntu-signed
          # NVIDIA modules (linux-modules-nvidia-590-*) load correctly.
          mkdir -p build/kernel/debs

          KERNEL_TAG=$(gh release list --repo Privasys/cvm-images \
            --json tagName -q '.[].tagName' | grep '^kernel-v' | head -1)
          if [ -z "$KERNEL_TAG" ]; then
            echo "::error::No kernel release found in Privasys/cvm-images. Push a kernel-v* tag to create one."
            exit 1
          fi
          echo "Downloading kernel .debs from release $KERNEL_TAG"
          gh release download "$KERNEL_TAG" --repo Privasys/cvm-images \
            --pattern '*.deb' --dir build/kernel/debs
          echo "Downloaded kernel .debs:"
          ls -lh build/kernel/debs/*.deb

      - name: Clone cvm-images (GPU overlay configs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Resolve the latest cvm-images GPU release tag.
          # The GPU mkosi.conf references images/tdx-gpu/ (boot.conf, APT repos,
          # nvidia-persistenced) and common/ from cvm-images.
          CVM_TAG_PREFIX="tdx-gpu-v"
          CVM_IMAGES_TAG=$(gh release list --repo Privasys/cvm-images \
            --json tagName -q '.[].tagName' | grep "^${CVM_TAG_PREFIX}" | head -1)
          if [ -z "$CVM_IMAGES_TAG" ]; then
            echo "::error::No cvm-images release found matching ${CVM_TAG_PREFIX}*"
            exit 1
          fi
          gh repo clone Privasys/cvm-images build/cvm-images -- --depth 1 --branch "$CVM_IMAGES_TAG"
          echo "Cloned cvm-images at $CVM_IMAGES_TAG"

      - name: Install mkosi and build dependencies
        run: |
          sudo pip3 install --break-system-packages pefile \
            'mkosi @ https://github.com/systemd/mkosi/archive/refs/tags/v26.tar.gz'
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip bubblewrap systemd-container \
            cryptsetup sbsigntool erofs-utils \
            mtools dosfstools e2fsprogs \
            grub-efi-amd64-signed shim-signed \
            systemd-ukify systemd-boot-efi systemd-boot

      - name: Recreate symlinks
        run: |
          # Git checks out symlinks as plain text files on the CI runner.
          # This helper converts them back to real symlinks.
          fix_symlink() {
            local f="$1"
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              target=$(cat "$f" | tr -d '\r\n')
              rm "$f"
              ln -s "$target" "$f"
              echo "Fixed: $f -> $target"
            fi
          }

          # 1. enclave-os-virtual own overlay symlinks
          pushd build/image/mkosi.extra/etc/systemd/system
          for f in \
            local-fs.target.wants/var-log.mount \
            local-fs.target.wants/var-tmp.mount \
            multi-user.target.wants/data.mount \
            multi-user.target.wants/luks-data.service \
            multi-user.target.wants/systemd-networkd.service \
            multi-user.target.wants/containerd.service \
            multi-user.target.wants/manager.service \
            multi-user.target.wants/caddy.service \
            sockets.target.wants/systemd-networkd.socket \
            sysinit.target.wants/systemd-networkd-wait-online.service; do
            fix_symlink "$f"
          done
          popd
          fix_symlink "build/image/mkosi.extra/etc/resolv.conf"

          # 2. cvm-images common overlay symlinks
          pushd build/cvm-images/common/mkosi.extra/etc/systemd/system
          for f in \
            local-fs.target.wants/tmp.mount \
            local-fs.target.wants/var-log.mount \
            local-fs.target.wants/var-tmp.mount \
            multi-user.target.wants/systemd-networkd.service \
            sockets.target.wants/systemd-networkd.socket \
            sysinit.target.wants/systemd-networkd-wait-online.service; do
            fix_symlink "$f"
          done
          popd
          fix_symlink "build/cvm-images/common/mkosi.extra/etc/resolv.conf"

          # 3. cvm-images GPU-specific overlay symlinks
          pushd build/cvm-images/images/tdx-gpu/mkosi.extra/etc/systemd/system/multi-user.target.wants
          for f in nvidia-persistenced.service; do
            fix_symlink "$f"
          done
          popd

      - name: Build image
        run: |
          chmod +x build/image/mkosi.extra/usr/bin/luks-setup
          cd build/image-gpu
          sudo mkosi --profile gcp build

      - name: Replace unsigned GRUB with Canonical-signed binary
        run: |
          RAW=$(ls build/image-gpu/enclave-os-virtual-gpu_*.raw)
          LOOPDEV=$(sudo losetup --find --show --partscan "$RAW")
          sudo mkdir -p /mnt/esp
          sudo mount "${LOOPDEV}p1" /mnt/esp
          sudo cp /usr/lib/grub/x86_64-efi-signed/grubx64.efi.signed \
            /mnt/esp/EFI/BOOT/grubx64.EFI
          echo "Installed Canonical-signed GRUB:"
          sudo sbverify --list /mnt/esp/EFI/BOOT/grubx64.EFI 2>&1 | head -5 || true
          sudo umount /mnt/esp
          sudo losetup -d "$LOOPDEV"

      - name: Extract dm-verity root hash
        id: verity
        run: |
          RAW=$(ls build/image-gpu/enclave-os-virtual-gpu_*.raw)
          LOOPDEV=$(sudo losetup --find --show --partscan "$RAW")
          sudo partprobe "$LOOPDEV" 2>/dev/null || true
          sleep 1

          VERITY_PART=""
          DATA_PART=""
          for part in "${LOOPDEV}p"*; do
            TYPE=$(sudo blkid -o value -s TYPE "$part" 2>/dev/null || true)
            if [ "$TYPE" = "DM_verity_hash" ]; then
              VERITY_PART="$part"
            elif [ "$TYPE" = "erofs" ]; then
              DATA_PART="$part"
            fi
          done

          ROOT_HASH=""
          if [ -n "$VERITY_PART" ] && [ -n "$DATA_PART" ]; then
            echo "Data partition:   $DATA_PART"
            echo "Verity partition: $VERITY_PART"

            DUMP=$(sudo veritysetup dump "$VERITY_PART" 2>/dev/null || true)
            echo "$DUMP"
            SALT=$(echo "$DUMP" | grep 'Salt:' | awk '{print $NF}')
            DATA_BS=$(echo "$DUMP" | grep 'Data block size:' | awk '{print $NF}')
            HASH_BS=$(echo "$DUMP" | grep 'Hash block size:' | awk '{print $NF}')

            if [ -n "$SALT" ] && [ -n "$DATA_BS" ] && [ -n "$HASH_BS" ]; then
              truncate -s 40M /tmp/verity-recompute.img
              ROOT_HASH=$(sudo veritysetup format "$DATA_PART" /tmp/verity-recompute.img \
                --data-block-size="$DATA_BS" --hash-block-size="$HASH_BS" \
                --salt="$SALT" --format=1 2>&1 \
                | grep 'Root hash:' | awk '{print $NF}')
              rm -f /tmp/verity-recompute.img
              if [ -n "$ROOT_HASH" ]; then
                echo "Computed dm-verity root hash: $ROOT_HASH"
              fi
            else
              echo "::warning::Could not parse verity superblock parameters"
            fi
          else
            echo "::warning::Could not identify data ($DATA_PART) or verity ($VERITY_PART) partition"
            sudo fdisk -l "$LOOPDEV"
            sudo blkid "${LOOPDEV}"* || true
          fi

          sudo losetup -d "$LOOPDEV"

          if [ -z "$ROOT_HASH" ]; then
            echo "::error::Failed to extract dm-verity root hash"
            exit 1
          fi
          echo "root_hash=$ROOT_HASH" >> "$GITHUB_OUTPUT"
          echo "### dm-verity Root Hash" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$ROOT_HASH" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ── GCP image publish (tag push or manual trigger) ──

      - name: Determine version slug
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RAW_VERSION="${{ github.ref_name }}"
          else
            RAW_VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          SLUG=$(echo "$RAW_VERSION" | tr '.' '-')
          echo "raw=$RAW_VERSION" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Package for GCP
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-v') || github.event.inputs.publish_gcp == 'true'
        run: |
          cp build/image-gpu/enclave-os-virtual-gpu_*.raw disk.raw
          tar -czf "enclave-os-virtual-gpu-${{ steps.version.outputs.raw }}.tar.gz" disk.raw
          rm disk.raw
          ls -lh enclave-os-virtual-gpu-*.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-v')
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          # Image tar.gz exceeds GitHub's 2 GB asset limit (NVIDIA/CUDA).
          # The image is published via GCS instead.
          generate_release_notes: true
          body: |
            ## Measurements

            | Measurement | Value |
            |-------------|-------|
            | **dm-verity root hash** | `${{ steps.verity.outputs.root_hash }}` |
            | **GCP Image** | `enclave-os-virtual-${{ steps.version.outputs.slug }}` |

            The dm-verity root hash is a SHA-256 digest of every byte on the read-only root filesystem.
            It is embedded in the kernel command line and measured into **RTMR[2]** at boot (via CC MR 3).
            RTMR[1] (CC MR 2) measures the EFI boot path (shim and GRUB binaries).
            Clients can verify these values via RA-TLS by inspecting the TDX quote in the server certificate.

            ### GPU Configuration

            This image includes NVIDIA driver 590 with Confidential Computing mode for Intel TDX + H100.
            Kernel cmdline includes `nvidia.NVreg_ConfidentialComputing=1` for encrypted GPU memory.

            ---

      # ── GCP image publish (tag push or manual trigger) ──

      - name: Authenticate to GCP
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-v') || github.event.inputs.publish_gcp == 'true'
        id: gcp_auth
        uses: google-github-actions/auth@v3
        continue-on-error: true
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Set up gcloud
        if: steps.gcp_auth.outcome == 'success'
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload image to GCS
        if: steps.gcp_auth.outcome == 'success'
        run: |
          gcloud storage cp \
            "enclave-os-virtual-gpu-${{ steps.version.outputs.raw }}.tar.gz" \
            "gs://${{ env.GCS_BUCKET }}/"

      - name: Create GCP Compute image
        if: steps.gcp_auth.outcome == 'success'
        run: |
          gcloud compute images create \
            "enclave-os-virtual-${{ steps.version.outputs.slug }}" \
            --project="${{ env.GCP_PROJECT }}" \
            --source-uri="gs://${{ env.GCS_BUCKET }}/enclave-os-virtual-gpu-${{ steps.version.outputs.raw }}.tar.gz" \
            --guest-os-features=TDX_CAPABLE,UEFI_COMPATIBLE,GVNIC,VIRTIO_SCSI_MULTIQUEUE \
            --family="${{ env.IMAGE_FAMILY }}"
          echo "GCP image created: enclave-os-virtual-${{ steps.version.outputs.slug }}"

      - name: Warn if GCP upload was skipped
        if: steps.gcp_auth.outcome != 'success' && (startsWith(github.ref, 'refs/tags/tdx-gpu-v') || github.event.inputs.publish_gcp == 'true')
        run: |
          echo "::warning::GCP image upload was skipped because Workload Identity Federation authentication failed. Configure the GCP_WIF_PROVIDER and GCP_SERVICE_ACCOUNT secrets, or set up the WIF pool in project ${{ env.GCP_PROJECT }}."

      # ── Summary ──

      - name: Build summary
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-v') || github.event.inputs.publish_gcp == 'true'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Enclave OS (Virtual) GPU - Build Summary

          | Field | Value |
          |-------|-------|
          | **Version** | \`${{ steps.version.outputs.raw }}\` |
          | **GCP Image** | \`enclave-os-virtual-${{ steps.version.outputs.slug }}\` |
          | **GCS URI** | \`gs://${{ env.GCS_BUCKET }}/enclave-os-virtual-gpu-${{ steps.version.outputs.raw }}.tar.gz\` |
          | **Image Family** | \`${{ env.IMAGE_FAMILY }}\` |
          | **dm-verity Root Hash** | \`${{ steps.verity.outputs.root_hash }}\` |

          ### Deploy (TDX + H100)

          \`\`\`bash
          gcloud compute instances create enclave-os-gpu \\
              --zone=europe-west4-c \\
              --machine-type=a3-highgpu-1g \\
              --network-interface=nic-type=GVNIC \\
              --maintenance-policy=TERMINATE \\
              --provisioning-model=SPOT \\
              --create-disk=auto-delete=yes,boot=yes,image=projects/${{ env.GCP_PROJECT }}/global/images/enclave-os-virtual-${{ steps.version.outputs.slug }},size=40,type=pd-balanced \\
              --shielded-secure-boot \\
              --shielded-vtpm \\
              --shielded-integrity-monitoring \\
              --confidential-compute-type=TDX
          \`\`\`
          EOF
